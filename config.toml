[device]
name = "MPK mini play"

[settings]
double_tap_ms = 300
long_press_ms = 2000

# ========== Global Knobs ==========
[[knobs]]
cc = 48
label = "Volume"
action = { type = "volume", target = "master" }

[[knobs]]
cc = 49
label = "Mic"
action = { type = "volume", target = "mic" }

[[knobs]]
cc = 50
label = "Spotify"
action = { type = "volume", target = "spotify" }

# ========== Mode: OBS ==========
[[modes]]
name = "OBS"
color = "#EF4444"

[[modes.pads]]
note = 16
label = "Rec"
action = { type = "obs", target = "toggle_recording" }

[[modes.pads]]
note = 17
label = "Stream"
action = { type = "obs", target = "toggle_streaming" }

[[modes.pads]]
note = 18
label = "Prev Scene"
action = { type = "obs", target = "prev_scene" }

[[modes.pads]]
note = 19
label = "Next Scene"
action = { type = "obs", target = "next_scene" }

[[modes.pads]]
note = 20
label = "Mute Mic"
action = { type = "obs", target = "mute:Mic/Aux" }

[[modes.pads]]
note = 21
label = "Mute Desktop"
action = { type = "obs", target = "mute:Desktop Audio" }

[[modes.pads]]
note = 22
label = "Screenshot"
action = { type = "keystroke", keys = "win+shift+s" }

[[modes.pads]]
note = 23
label = "Play/Pause"
action = { type = "keystroke", keys = "playpause" }

# ========== Mode: Voice Scribe ==========
[[modes]]
name = "Voice Scribe"
color = "#EC4899"
# Pads are handled by the voice_scribe plugin
# Press a style pad to start recording, press again to stop and translate
# Pad layout: Professional | Casual | Technical | Email
#              Summary     | Raw RU | Clipboard | Cancel

# ========== Mode: Sound Pads ==========
[[modes]]
name = "Sound Pads"
color = "#F59E0B"
# Pads are handled by the sample_player plugin

# ========== Mode: Voicemeeter ==========
[[modes]]
name = "Voicemeeter"
color = "#06B6D4"
# Pads and knobs are handled by the voicemeeter plugin
# Top row:  Mute Mic | Mute Desk | EQ B1 | Send2Mic
# Bot row:  Gate     | Monitor   | Comp  | Resync
# Knobs: K1=Mic Gain  K2=Gate  K3=Comp (or Spotify in default mode)  Joy=B1 Gain

# ========== Mode: OBS Session ==========
[[modes]]
name = "OBS Session"
color = "#8B5CF6"
# Pads are handled by the obs_session plugin
# Top row (active): Start Session | Record | Stop Session | free
# Bottom row: reserved for future session utilities

# ========== Mode: Spotify ==========
[[modes]]
name = "Spotify"
color = "#1DB954"

[[modes.pads]]
note = 16
label = "Play/Pause"
action = { type = "app_keystroke", keys = "space", process = "Spotify.exe" }

[[modes.pads]]
note = 17
label = "Next"
action = { type = "app_keystroke", keys = "ctrl+right", process = "Spotify.exe" }

[[modes.pads]]
note = 18
label = "Prev"
action = { type = "app_keystroke", keys = "ctrl+left", process = "Spotify.exe" }

[[modes.pads]]
note = 19
label = "Like"
action = { type = "app_keystroke", keys = "alt+shift+b", process = "Spotify.exe" }

[[modes.pads]]
note = 20
label = "Shuffle"
action = { type = "app_keystroke", keys = "ctrl+s", process = "Spotify.exe" }

[[modes.pads]]
note = 21
label = "Repeat"
action = { type = "app_keystroke", keys = "ctrl+r", process = "Spotify.exe" }

[[modes.pads]]
note = 22
label = "Search"
action = { type = "app_keystroke", keys = "ctrl+l", process = "Spotify.exe" }

[[modes.pads]]
note = 23
label = "Liked Songs"
action = { type = "app_keystroke", keys = "alt+shift+s", process = "Spotify.exe" }

# ========== Context Overrides ==========
[[contexts]]
process = "obs64.exe"
mode = "OBS"

[[contexts]]
process = "voicemeeterpro_x64.exe"
mode = "Voicemeeter"

[[contexts]]
process = "Spotify.exe"
mode = "Spotify"
