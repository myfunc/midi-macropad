[device]
name = "MPK mini play"

[settings]
double_tap_ms = 300
long_press_ms = 2000

[[knobs]]
cc = 48
label = "Volume"

[knobs.action]
type = "volume"
target = "master"

[[knobs]]
cc = 49
label = "Mic"

[knobs.action]
type = "volume"
target = "mic"

[[knobs]]
cc = 50
label = "Spotify"

[knobs.action]
type = "volume"
target = "spotify"

# ========== Pad Presets ==========

[[pad_presets]]
name = "Spotify"

[[pad_presets.pads]]
note = 16
label = "Play/Pause"

[pad_presets.pads.action]
type = "app_keystroke"
keys = "space"
process = "Spotify.exe"

[[pad_presets.pads]]
note = 17
label = "Next"

[pad_presets.pads.action]
type = "app_keystroke"
keys = "ctrl+right"
process = "Spotify.exe"

[[pad_presets.pads]]
note = 18
label = "Prev"

[pad_presets.pads.action]
type = "app_keystroke"
keys = "ctrl+left"
process = "Spotify.exe"

[[pad_presets.pads]]
note = 19
label = "Like"

[pad_presets.pads.action]
type = "app_keystroke"
keys = "alt+shift+b"
process = "Spotify.exe"

[[pad_presets.pads]]
note = 20
label = "Shuffle"

[pad_presets.pads.action]
type = "app_keystroke"
keys = "ctrl+s"
process = "Spotify.exe"

[[pad_presets.pads]]
note = 21
label = "DJ Mix"

[pad_presets.pads.action]
type = "app_keystroke"
keys = "ctrl+shift+j"
process = "Spotify.exe"

[[pad_presets.pads]]
note = 22
label = "Add to PL"

[pad_presets.pads.action]
type = "plugin"
target = "Spotify"

[[pad_presets.pads]]
note = 23
label = "Remove PL"

[pad_presets.pads.action]
type = "plugin"
target = "Spotify"

