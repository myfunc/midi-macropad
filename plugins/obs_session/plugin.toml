[plugin]
name = "OBS"
version = "0.4.0"
description = "Unified OBS mode — scene switching, recording, session diary, MIDI feedback"
entry = "obs_session.OBSSessionPlugin"

[settings]
host = "127.0.0.1"
port = 4455
password = ""
scene_screen = "MM_Screen"
scene_camera = "MM_Camera"
scene_pip = "MM_ScreenPiP"
right_screen_source = "Right Screen"
camera_source = "WebCam"
mic_source = "Mic/Aux"
output_dir = ""
auto_setup_scene = true
postprocess_stitch = true
postprocess_transcript = false
postprocess_open_folder = true
